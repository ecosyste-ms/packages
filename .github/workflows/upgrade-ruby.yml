name: Upgrade Ruby

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  upgrade-ruby:
    name: Upgrade Ruby version
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update .ruby-version and other files
      pull-requests: write # Needed to create pull requests with Ruby upgrades
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: andrew/ruby-upgrade-action@9339371b5b58e54a2090801c5f3ef54fcc6ee044
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
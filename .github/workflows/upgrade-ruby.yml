name: Upgrade Ruby

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  upgrade-ruby:
    name: Upgrade Ruby version
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update .ruby-version and other files
      pull-requests: write # Needed to create pull requests with Ruby upgrades
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: andrew/ruby-upgrade-action@2b43aeeb74ff6750d3667a91971dd55b942b9355
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
name: CI

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:14@sha256:ca25035f7e6f74552655a1c5e4a9eb21f85e9d316f1f70371f790ef70095dd58
        env:
          POSTGRES_USER: packages
          POSTGRES_DB: packages_test
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis@sha256:43355efd22490e31ca14b9d569367d05121e2be61fd8e47937563ae2a80952ae
        ports:
        - 6379:6379
        options: --entrypoint redis-server

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install dependent libraries
        run: sudo apt-get install libpq-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455
        with:
          bundler-cache: true

      - name: Install pom
        env:
          POM_VERSION: 0.1.2
        run: |
          curl -fsSL "https://github.com/git-pkgs/pom/releases/download/v${POM_VERSION}/pom_${POM_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin pom
          pom -version

      - name: Run tests
        env:
          RAILS_ENV: test
          POSTGRES_DB: packages_test
          POSTGRES_USER: packages
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
        run: bundle exec rake db:schema:load test
